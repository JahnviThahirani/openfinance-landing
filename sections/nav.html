<style>
  nav {
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 9999;
    height: 72px;
    display: grid;
    grid-template-columns: 200px 1fr 200px;
    align-items: center;
    padding: 0 40px;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    /* No border by default — outline expands in from pill on scroll */
    border-bottom: 1px solid transparent;
    transition: border-color 0.8s ease;
  }

  nav.scrolled {
    border-bottom: 1px solid var(--border);
  }

  /* ── LEFT: logo ── */
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 9px;
    text-decoration: none;
  }

  .nav-logo-mark {
    width: 30px;
    height: 30px;
    background: var(--accent);
    border-radius: 8px;
    flex-shrink: 0;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .nav-logo-mark::before {
    content: '';
    position: absolute;
    width: 11px;
    height: 11px;
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 50%;
  }

  .nav-logo-mark::after {
    content: '';
    position: absolute;
    width: 4px;
    height: 4px;
    background: #fff;
    border-radius: 50%;
    animation: pulse-dot 2s ease infinite;
  }

  .nav-logo-text {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.4px;
    color: var(--text-primary);
  }

  /* ── CENTER: pill nav ── */
  .nav-center {
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 2px;
    list-style: none;
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 5px;
    background: var(--bg-elevated);
    transition: border-radius 0.8s cubic-bezier(0.22, 1, 0.36, 1),
                border-color 0.8s ease,
                background 0.8s ease,
                padding 0.8s ease;
  }

  /* When scrolled — pill expands to full-width nav bar feel */
  nav.scrolled .nav-links {
    border-color: transparent;
    background: transparent;
  }

  .nav-links li a {
    display: block;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    text-decoration: none;
    padding: 7px 18px;
    border-radius: 100px;
    transition: all 0.15s ease;
    white-space: nowrap;
    letter-spacing: -0.1px;
    line-height: 1;
  }

  .nav-links li a:hover {
    color: var(--text-primary);
    background: #fff;
  }

  /* ── RIGHT: actions ── */
  .nav-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: flex-end;
  }

  .nav-signin {
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 8px;
    transition: color 0.15s;
    white-space: nowrap;
    letter-spacing: -0.1px;
  }

  .nav-signin:hover { color: var(--text-primary); }

  .nav-cta {
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    background: #0d0f14;
    text-decoration: none;
    padding: 8px 20px;
    border-radius: 8px;
    transition: all 0.2s ease;
    white-space: nowrap;
    letter-spacing: -0.2px;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.08) inset,
      0 2px 8px rgba(0,0,0,0.25),
      0 0 16px rgba(0,0,0,0.15);
  }

  .nav-cta::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 8px;
    background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, transparent 60%);
    pointer-events: none;
  }

  .nav-cta:hover {
    background: #1a1d26;
    transform: translateY(-1px);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.1) inset,
      0 4px 16px rgba(0,0,0,0.3),
      0 0 28px rgba(0,0,0,0.2);
  }

  /* ── Mobile ── */
  @media (max-width: 960px) {
    nav {
      grid-template-columns: 1fr auto;
      padding: 0 20px;
      height: 64px;
    }
    .nav-center { display: none; }
    .nav-signin { display: none !important; }
  }

  @media (max-width: 480px) {
    nav { padding: 0 16px; height: 56px; }
    .nav-logo-text { font-size: 13px; }
    .nav-cta { display: none; }
  }

  /* ── Hamburger button ── */
  .nav-hamburger {
    display: none;
    flex-direction: column;
    justify-content: center;
    gap: 5px;
    width: 36px;
    height: 36px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px;
    margin-left: 8px;
    border-radius: 8px;
    transition: background 0.15s;
  }

  .nav-hamburger:hover { background: var(--bg-elevated); }

  .nav-hamburger span {
    display: block;
    width: 20px;
    height: 2px;
    background: var(--text-primary);
    border-radius: 2px;
    transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    transform-origin: center;
  }

  .nav-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .nav-hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .nav-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  @media (max-width: 960px) {
    .nav-hamburger { display: flex; }
  }

  /* ── Mobile drawer ── */
  .nav-drawer {
    display: none;
    position: fixed;
    top: 64px;
    left: 0;
    width: 100%;
    background: rgba(255,255,255,0.98);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 24px;
    flex-direction: column;
    gap: 4px;
    z-index: 9998;
    transform: translateY(-8px);
    opacity: 0;
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s ease;
    pointer-events: none;
  }

  .nav-drawer.open {
    transform: translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  @media (max-width: 960px) {
    .nav-drawer { display: flex; }
  }

  @media (max-width: 480px) {
    .nav-drawer { top: 56px; }
  }

  .nav-drawer a {
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 500;
    color: var(--text-secondary);
    text-decoration: none;
    padding: 12px 8px;
    border-radius: 8px;
    transition: all 0.15s;
    border-bottom: 1px solid var(--border);
  }

  .nav-drawer a:last-child { border-bottom: none; }
  .nav-drawer a:hover { color: var(--text-primary); background: var(--bg-elevated); }

  .nav-drawer-cta {
    margin-top: 12px;
    display: flex;
    gap: 8px;
  }

  .nav-drawer-cta a {
    flex: 1;
    text-align: center;
    justify-content: center;
    border-bottom: none !important;
    border-radius: 8px !important;
    font-weight: 600 !important;
  }

  .nav-drawer-cta .drawer-signin {
    background: var(--bg-elevated);
    border: 1px solid var(--border) !important;
    color: var(--text-primary) !important;
  }

  .nav-drawer-cta .drawer-getkey {
    background: var(--text-primary) !important;
    color: #fff !important;
  }
</style>

<nav>
  <a href="/" class="nav-logo">
    <div class="nav-logo-mark"></div>
    <span class="nav-logo-text">openfinance</span>
  </a>

  <div class="nav-center">
    <ul class="nav-links">
      <li><a href="#markets">Markets</a></li>
      <li><a href="#how">How it works</a></li>
      <li><a href="#strategies">Strategies</a></li>
      <li><a href="https://docs.openfinance.tech">Docs</a></li>
      <li><a href="#faq">FAQ</a></li>
    </ul>
  </div>

  <div class="nav-actions">
    <a href="#" class="nav-cta">Sign In</a>
    <button class="nav-hamburger" id="navHamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<!-- Mobile drawer -->
<div class="nav-drawer" id="navDrawer">
  <a href="#markets">Markets</a>
  <a href="#how">How it works</a>
  <a href="#strategies">Strategies</a>
  <a href="https://docs.openfinance.tech">Docs</a>
  <a href="#faq">FAQ</a>
  <div class="nav-drawer-cta">
    <a href="#" class="drawer-signin">Sign in</a>
    <a href="#" class="drawer-getkey">Sign In</a>
  </div>
</div>

<script>
  (function () {
    const nav       = document.querySelector('nav');
    const hamburger = document.getElementById('navHamburger');
    const drawer    = document.getElementById('navDrawer');
    if (!nav) return;

    // Scroll border
    function onScroll() {
      nav.classList.toggle('scrolled', window.scrollY > 10);
    }
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();

    // Hamburger toggle
    if (hamburger && drawer) {
      hamburger.addEventListener('click', () => {
        const isOpen = hamburger.classList.toggle('open');
        drawer.classList.toggle('open', isOpen);
      });

      // Close on drawer link click
      drawer.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', () => {
          hamburger.classList.remove('open');
          drawer.classList.remove('open');
        });
      });

      // Close on outside click
      document.addEventListener('click', (e) => {
        if (!nav.contains(e.target) && !drawer.contains(e.target)) {
          hamburger.classList.remove('open');
          drawer.classList.remove('open');
        }
      });
    }
  })();
</script>
